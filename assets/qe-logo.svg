<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="qeCyan" x1="150" y1="16" x2="196" y2="204" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c8fff9"/>
      <stop offset=".45" stop-color="#00eaff"/>
      <stop offset="1" stop-color="#0088ff"/>
    </linearGradient>
    <filter id="qeGlow" x="-45%" y="-45%" width="190%" height="190%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Soft cyan hex rim only (blurred). Letter fills are hard polygons, not traced PNG edges. -->
  <g filter="url(#qeGlow)">
    <path stroke="url(#qeCyan)" stroke-width="6" stroke-linejoin="miter" stroke-linecap="square"
      d="M100 15 L182 63 V158 L100 205 L18 158 V63 Z"/>
  </g>

  <!-- Q: left half-hex, counter hole, Q-tail notch at center/bottom -->
  <path fill="#fff" fill-rule="evenodd" d="
    M100 15 L18 63 L18 158 L100 205 L100 186 L88 179 L88 174 L100 167 L100 15 Z
    M83 44 L83 149 L34 148 L34 73 Z
  "/>

  <!-- E: vertical spine + top/middle/bottom arms (pointed middle) -->
  <path fill="#fff" d="
    M108 33 H124 V188 H108 Z
    M108 33 L182 75 L182 94 L124 61 V33 Z
    M124 97 H171 L180 110 L171 123 H124 Z
    M124 160 L182 127 L182 146 L108 188 H124 Z
  "/>
</svg>
